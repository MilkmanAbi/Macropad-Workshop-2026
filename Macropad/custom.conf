# ─────────────────────────────────────────────────────────────────────────────
#  custom.conf — Macropad Workshop 2026
#  Your personal layer. No Python required. Just edit and save.
#
#  Lines starting with # are comments — they're ignored.
#  Keys are not case-sensitive:  BUTTON1 = rickroll  works fine.
# ─────────────────────────────────────────────────────────────────────────────


# ── Layer name (shows in serial console) ─────────────────────────────────────

NAME = My Layer


# ── Button actions ────────────────────────────────────────────────────────────
#
#  Pick one action per button. Delete the ones you don't want.
#
#  ┌─ Clipboard ──────────────────────────────────────────────────────────────┐
#  │  COPY          PASTE          CUT          SELECT_ALL                    │
#  ├─ Editing ───────────────────────────────────────────────────────────────-┤
#  │  SAVE          UNDO           REDO         FIND                          │
#  │  NEW_TAB       CLOSE_TAB      SCREENSHOT                                 │
#  ├─ Media ──────────────────────────────────────────────────────────────────┤
#  │  VOL_UP        VOL_DOWN       MUTE         PLAY_PAUSE                    │
#  │  NEXT_TRACK    PREV_TRACK                                                │
#  ├─ Fun ────────────────────────────────────────────────────────────────────┤
#  │  RICKROLL      NYAN_CAT       OPEN_BROWSER                               │
#  ├─ Power actions (fill in the = part) ─────────────────────────────────────┤
#  │  OPENWEBSITE = https://yoursite.com   (opens any URL via Win+R)          │
#  │  TYPE = hello world                   (types any text)                   │
#  │  SHORTCUT = CTRL+SHIFT+T              (any key combo)                    │
#  └──────────────────────────────────────────────────────────────────────────┘

BUTTON1 = SAVE
BUTTON2 = UNDO
BUTTON3 = REDO


# ── LED Color ─────────────────────────────────────────────────────────────────
#
#  Use a hex color:   COLOR = 0xFF8800   (orange)
#  Or rainbow mode:   COLOR = RAINBOW
#
#  Quick colors:
#    Red     0xFF0000    Green   0x00FF00    Blue    0x0000FF
#    Cyan    0x00FFFF    Pink    0xFF00FF    Yellow  0xFFFF00
#    White   0xFFFFFF    Orange  0xFF6600    Mint    0x00FF88

COLOR = 0x00FF88


# ─────────────────────────────────────────────────────────────────────────────
#  Examples from the workshop — uncomment any block to try it:
# ─────────────────────────────────────────────────────────────────────────────

# Example: Rickroll machine
# BUTTON1 = RICKROLL
# BUTTON2 = NYAN_CAT
# BUTTON3 = OPEN_BROWSER
# COLOR   = RAINBOW

# Example: Open your own website
# BUTTON1 = OPENWEBSITE = https://github.com
# BUTTON2 = OPENWEBSITE = https://youtube.com
# BUTTON3 = SCREENSHOT
# COLOR   = 0x0033FF

# Example: Type a phrase (useful for login shortcuts)
# BUTTON1 = TYPE = sudo apt update && sudo apt upgrade
# BUTTON2 = TYPE = git push origin main
# BUTTON3 = SAVE
# COLOR   = 0xFF0000

# Example: Custom keyboard shortcut
# BUTTON1 = SHORTCUT = CTRL+SHIFT+T    (reopen closed tab)
# BUTTON2 = SHORTCUT = WIN+D           (show desktop)
# BUTTON3 = SHORTCUT = ALT+F4          (close window)
# COLOR   = 0x8800FF
